<!DOCTYPE html>
<html>
<head>
    <title>CSV Upload</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:450px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.15);
            text-align:center;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        #fileName{
            color:#28a745;
            margin-bottom:20px;
            min-height:25px;
        }

        input[type="file"]{
            width:100%;
            padding:10px;
            border:2px dashed #007bff;
            border-radius:8px;
            cursor:pointer;
            margin-bottom:20px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
        }
    </style>

    <script>
        function showFileName(input) {
            if (input.files.length > 0) {
                document.getElementById("fileName").innerHTML =
                    "Selected File: <b>" + input.files[0].name + "</b>";
            }
        }
    </script>
</head>
<body>

<div class="container">

    <h2>Upload CSV File</h2>

    <h3 id="fileName">No file selected</h3>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <input
            type="file"
            name="csvfile"
            accept=".csv"
            onchange="showFileName(this)"
            required
        >

        <button type="submit">Upload</button>

    </form>

</div>

</body>
</html>
